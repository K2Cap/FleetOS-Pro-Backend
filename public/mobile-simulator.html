<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gravity Mobile Simulator</title>
<script>
  // Pure Production Mode: No Local Redirects
</script>
<style>
  :root {
    --frame: #2b2b2b;
    --frame-dark: #1a1a1a;
    --screen-bg: #0f0f0f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: #111;
    color: #eee;
    height: 100%;
    display: grid;
    grid-template-rows: auto 1fr;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #151515;
    border-bottom: 1px solid #232323;
  }
  .topbar h1 {
    font-size: 14px;
    letter-spacing: 0.4px;
    margin: 0 10px 0 0;
    font-weight: 700;
  }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .controls select, .controls input, .controls button {
    background: #1f1f1f;
    color: #eee;
    border: 1px solid #2c2c2c;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
  }
  .controls button { cursor: pointer; }
  .controls label { font-size: 12px; color: #bbb; }
  .stage {
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .device {
    position: relative;
    background: linear-gradient(180deg, var(--frame), var(--frame-dark));
    padding: 18px;
    border-radius: 36px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
  }
  .device::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 18px;
    border-radius: 14px;
    background: #0b0b0b;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }
  .screen {
    background: var(--screen-bg);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .screen iframe {
    border: 0;
    width: 100%;
    height: 100%;
    background: #fff;
  }
  .meta {
    margin-top: 12px;
    font-size: 12px;
    color: #9b9b9b;
    text-align: center;
  }

 html, body { height: 100% !important; width: 100% !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; background: #f5f2ec !important; }
</style>
</head>
<body>
  <div class="topbar">
    <h1>Gravity Mobile Simulator</h1>
    <div class="controls">
      <label>Preset</label>
      <select id="preset">
        <option value="390x844">iPhone 14 (390×844)</option>
        <option value="393x852">iPhone 15 Pro (393×852)</option>
        <option value="360x800">Pixel 7 (360×800)</option>
        <option value="412x915">Pixel 8 Pro (412×915)</option>
        <option value="360x780">Android Compact (360×780)</option>
      </select>
      <label>Width</label>
      <input id="w" type="number" min="280" max="600" value="390" />
      <label>Height</label>
      <input id="h" type="number" min="500" max="1100" value="844" />
      <label>Scale</label>
      <input id="scale" type="number" step="0.05" min="0.6" max="1.2" value="1" />
      <button id="reload">Reload</button>
      <label><input id="auto" type="checkbox" /> Auto reload (2s)</label>
    </div>
  </div>
  <div class="stage">
    <div class="device" id="device">
      <div class="screen" id="screen">
        <iframe id="frame" src="about:blank"></iframe>
        <script>
          (function() {
            const frame = document.getElementById('frame');
            frame.src = 'App - Login.html';
          })();
        </script>
      </div>
    </div>
    <div class="meta" id="meta"></div>
  </div>

<script>
  const preset = document.getElementById('preset');
  const w = document.getElementById('w');
  const h = document.getElementById('h');
  const scale = document.getElementById('scale');
  const screen = document.getElementById('screen');
  const device = document.getElementById('device');
  const frame = document.getElementById('frame');
  const meta = document.getElementById('meta');
  const reloadBtn = document.getElementById('reload');
  const auto = document.getElementById('auto');
  let timer = null;
  const MOBILE_OVERRIDES = `
html, body {
  height: 100% !important;
  width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow-x: hidden !important;
  overflow-y: auto !important;
  display: block !important;
  background: #f5f2ec !important;
}

#root, .phone, .phone-shell, [class*="app-container"], .inner-container {
  width: 100% !important;
  max-width: none !important;
  height: 100% !important;
  max-height: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  border: none !important;
  margin: 0 !important;
  display: flex !important;
  flex-direction: column !important;
}

/* Ensure header and nav touch edges */
header, .sbar, .status-bar, .bottom-nav, footer {
  width: 100% !important;
  border-radius: 0 !important;
}

@media (max-width: 900px) {
  #bgLayer {
    background: radial-gradient(ellipse 140% 140% at 50% 45%, #f5f2ec 0%, #edeae2 50%, #e8e4da 100%) !important;
  }
  #mapCanvas { width: 100% !important; height: 100% !important; }
}
`;

  const MOBILE_SCRIPT = `
(() => {
  try {
    const aspect = Math.cos(22.5 * Math.PI / 180) * 29.47 / 28.98;
    function fitFullMap() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const maxW = vw * 0.96;
      const maxH = vh * 0.96;
      let mW = maxW;
      let mH = mW / aspect;
      if (mH > maxH) { mH = maxH; mW = mH * aspect; }

      const c = document.getElementById('mapCanvas');
      if (c) { c.style.width = '100%'; c.style.height = '100%'; }

      let cw = null;
      let ch = null;
      if (typeof canvas !== 'undefined') {
        canvas.width = Math.round(vw);
        canvas.height = Math.round(vh);
        cw = canvas.width;
        ch = canvas.height;
      }
      if (cw !== null && typeof W !== 'undefined') W = cw;
      if (ch !== null && typeof H !== 'undefined') H = ch;
      if (typeof mapW !== 'undefined') mapW = mW;
      if (typeof mapH !== 'undefined') mapH = mH;
      if (typeof mapX !== 'undefined') mapX = (W - mapW) * 0.5;
      if (typeof mapY !== 'undefined') mapY = (H - mapH) * 0.5;
      if (typeof GEO !== 'undefined' && GEO.loaded) GEO.rebuildProjectionCache();
      if (typeof initTrucks === 'function') initTrucks();
      if (typeof initNodes === 'function') initNodes();
    }
    window.addEventListener('resize', fitFullMap);
    fitFullMap();
  } catch (e) {}
})();
`;

  function applySize() {
    const width = Number(w.value) || 390;
    const height = Number(h.value) || 844;
    const s = Number(scale.value) || 1;
    screen.style.width = width + 'px';
    screen.style.height = height + 'px';
    device.style.transform = `scale(${s})`;
    meta.textContent = `Viewport: ${width}×${height} @ ${s}x`;
  }

  function reloadFrame() {
    const src = frame.getAttribute('src').split('?')[0];
    frame.setAttribute('src', src + '?t=' + Date.now());
  }

  function injectMobileOverrides() {
    const doc = frame.contentDocument || frame.contentWindow?.document;
    if (!doc) return;
    let style = doc.getElementById('sim-mobile-overrides');
    if (!style) {
      style = doc.createElement('style');
      style.id = 'sim-mobile-overrides';
      doc.head.appendChild(style);
    }
    style.textContent = MOBILE_OVERRIDES;
  }

  function injectMobileScript() {
    const doc = frame.contentDocument || frame.contentWindow?.document;
    if (!doc) return;
    let script = doc.getElementById('sim-mobile-script');
    if (!script) {
      script = doc.createElement('script');
      script.id = 'sim-mobile-script';
      doc.body.appendChild(script);
    }
    script.textContent = MOBILE_SCRIPT;
  }

  preset.addEventListener('change', () => {
    const [pw, ph] = preset.value.split('x').map(Number);
    w.value = pw; h.value = ph; applySize();
  });
  [w, h, scale].forEach(el => el.addEventListener('input', applySize));
  reloadBtn.addEventListener('click', reloadFrame);
  frame.addEventListener('load', () => {
    injectMobileOverrides();
    injectMobileScript();
  });
  auto.addEventListener('change', () => {
    if (auto.checked) {
      timer = setInterval(reloadFrame, 2000);
    } else if (timer) {
      clearInterval(timer);
      timer = null;
    }
  });

  applySize();
  injectMobileOverrides();
  injectMobileScript();
</script>
</body>
</html>
