<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Fleet — FleetOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,wght@0,700;1,700&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:  #1a5c3a;
    --green-mid:   #2d6b47;
    --green-tint:  #eaf5ee;
    --orange:      #e07028;
    --cream:       #f2ede3;
    --cream-dark:  #e4ddd0;
    --cream-deep:  #d6cfc0;
    --white:       #ffffff;
    --text-dark:   #1a1a1a;
    --text-muted:  #7a7a6e;
    --text-light:  #b0aa98;
    --amber:       #c47d14;
    --red:         #b83b2a;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
  }

  body {
    overflow: hidden;
  }

  .screen {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    background: var(--cream);
    position: relative;
  }

  .app-header {
    background: var(--green-dark);
    padding: 52px 20px 16px;
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .header-title h1 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 3px;
    line-height: 1.1;
  }

  .header-title h1 em {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 700;
    color: #f0a85a;
  }

  .header-title .sub {
    font-size: 11.5px;
    color: rgba(255,255,255,0.5);
  }

  .add-btn {
    background: var(--orange);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: transform .14s ease, box-shadow .18s ease, background .18s ease;
  }

  .add-btn:active {
    transform: scale(0.97);
  }

  .search-bar {
    background: rgba(255,255,255,0.11);
    border-radius: 12px;
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: #fff;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
  }

  .search-bar input::placeholder {
    color: rgba(255,255,255,0.42);
  }

  .stat-strip {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--cream-dark);
    flex-shrink: 0;
  }

  .stat-item {
    flex: 1;
    padding: 11px 6px;
    text-align: center;
    border-right: 1px solid var(--cream-dark);
  }

  .stat-item:last-child { border-right: none; }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
  }

  .stat-num.green { color: var(--green-dark); }
  .stat-num.amber { color: var(--amber); }
  .stat-num.red   { color: var(--red); }

  .stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .filter-row {
    display: flex;
    gap: 8px;
    padding: 10px 16px 6px;
    flex-shrink: 0;
    overflow-x: auto;
    background: var(--cream);
  }

  .filter-row::-webkit-scrollbar { display: none; }

  .pill {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    border: none;
    transition: transform .12s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
  }

  .pill.active {
    background: var(--green-dark);
    color: white;
  }

  .pill.inactive {
    border: 1.5px solid var(--cream-deep);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
    background: transparent;
  }

  .pill:active {
    transform: scale(0.96);
  }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .status-dot.green { background: #2ecc71; }
  .status-dot.amber { background: #f0a030; }
  .status-dot.red { background: #d25545; }

  .fleet-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px 100px;
    -webkit-overflow-scrolling: touch;
  }

  .truck-card {
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--cream-dark);
    margin-bottom: 12px;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .16s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .truck-card:active {
    transform: scale(0.985);
    box-shadow: 0 8px 20px rgba(26,24,20,.10);
  }

  .truck-card-head {
    padding: 12px 14px 11px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  .truck-model {
    font-size: 10.5px;
    color: var(--text-muted);
    font-weight: 500;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10.5px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .status-badge.active { background: var(--green-tint); color: var(--green-dark); }
  .status-badge.idle   { background: #fff8e6; color: var(--amber); }
  .status-badge.maintenance { background: #fdecea; color: var(--red); }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .plate-section { padding: 0 14px 14px; }

  .plate {
    display: flex;
    align-items: center;
    background: #e9e9e9;
    border: 2.5px solid #888;
    border-radius: 7px;
    padding: 9px 14px 9px 10px;
    gap: 10px;
    width: 100%;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), inset 0 -1px 0 rgba(0,0,0,0.07);
  }

  .plate-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex-shrink: 0;
  }

  .ind-label {
    font-size: 7.5px;
    font-weight: 700;
    color: #1a4fa0;
    letter-spacing: 0.03em;
    line-height: 1;
  }

  .plate-divider {
    width: 1.5px;
    height: 36px;
    background: #bbb;
    flex-shrink: 0;
  }

  .plate-reg {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.08em;
    line-height: 1;
    flex: 1;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
  }

  .build-tag {
    text-align: center;
    font-size: 10px;
    color: var(--text-light);
    padding: 4px 0 8px;
  }

  .build-tag a {
    color: var(--orange);
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
    gap: 10px;
    background: var(--white);
    border: 1px solid var(--cream-dark);
    border-radius: 16px;
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    background: var(--cream-dark);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
  }

  .empty-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-dark);
  }

  .empty-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--white);
    border-top: 1px solid var(--cream-dark);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 8px 0 env(safe-area-inset-bottom, 16px);
    z-index: 100;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: var(--text-muted);
    cursor: pointer;
    min-width: 52px;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none;
    transition: transform .14s ease, color .18s ease;
  }

  .nav-item:active {
    transform: scale(0.94);
  }

  .nav-item.active { color: var(--green-dark); font-weight: 600; }

  .nav-item.active::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;

    height: 3px;
    background: var(--orange);
    border-radius: 0 0 4px 4px;
  }

  .nav-fab {
    width: 50px;
    height: 50px;
    background: var(--green-dark);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -18px;
    box-shadow: 0 6px 20px rgba(26,92,58,0.4);
    cursor: pointer;

  }

  .nav-fab:active {
    transform: scale(0.94);

  }

  .fab-label {
    color: var(--green-dark);
    font-weight: 600;
    font-size: 10px;
  }
</style>
</head>

<script>
const FLEET_API_BASE = window.FLEET_API_BASE || window.APP_API_BASE || 'https://fleetos-pro-backend-production.up.railway.app';
let fleetRows = [];
let currentFilter = 'all';
let currentSearch = '';

function getFleetAuthToken() {
  return localStorage.getItem('fleetToken') || localStorage.getItem('token') || '';
}

function normalizeStatus(value) {
  const text = String(value || '').trim().toLowerCase();
  if (text.includes('service') || text.includes('maint')) return 'maintenance';
  if (text.includes('idle') || text.includes('park')) return 'idle';
  return 'active';
}

function humanizeStatus(value) {
  const normalized = normalizeStatus(value);
  if (normalized === 'maintenance') return 'Service';
  if (normalized === 'idle') return 'Idle';
  return 'Active';
}

function formatTruckRegNo(value) {
  const compact = String(value || '').toUpperCase().replace(/[^A-Z0-9]/g, '').trim();
  const match = compact.match(/^([A-Z]{2})(\d{1,2})([A-Z]{1,3})(\d{1,4})$/);
  if (!match) return String(value || '').trim().toUpperCase();
  return `${match[1]} ${match[2].padStart(2, '0')} ${match[3]} ${match[4].padStart(4, '0')}`;
}

function summarizeTruckType(row) {
  return [row.make, row.model, row.truck_type || row.truckType].filter(Boolean).join(' · ') || 'Truck profile';
}

function authFetch(path, options = {}) {
  const token = getFleetAuthToken();
  const headers = new Headers(options.headers || {});
  if (token && !headers.has('Authorization')) headers.set('Authorization', `Bearer ${token}`);
  return fetch(path.startsWith('http') ? path : `${FLEET_API_BASE}${path}`, { cache:'no-store', ...options, headers });
}

function updateStats(rows) {
  const active = rows.filter((row) => normalizeStatus(row.status) === 'active').length;
  const idle = rows.filter((row) => normalizeStatus(row.status) === 'idle').length;
  const maintenance = rows.filter((row) => normalizeStatus(row.status) === 'maintenance').length;
  document.getElementById('countActive').textContent = active;
  document.getElementById('countIdle').textContent = idle;
  document.getElementById('countService').textContent = maintenance;
  const pills = document.querySelectorAll('.filter-row .pill');
  if (pills[0]) pills[0].textContent = `All (${rows.length})`;
}

function getFilteredFleetRows() {
  return fleetRows.filter((row) => {
    const status = normalizeStatus(row.status);
    const reg = formatTruckRegNo(row.reg_no || row.regNo || '').toLowerCase();
    const compactReg = reg.replace(/\s+/g, '');
    const driver = String(row.driver_assigned || row.driver || '').toLowerCase();
    const makeModel = summarizeTruckType(row).toLowerCase();
    const matchesFilter = currentFilter === 'all' ? true : status === currentFilter;
    const normalizedSearch = String(currentSearch || '').replace(/\s+/g, '');
    const matchesSearch = !currentSearch || reg.includes(currentSearch) || compactReg.includes(normalizedSearch) || driver.includes(currentSearch) || makeModel.includes(currentSearch);
    return matchesFilter && matchesSearch;
  });
}

function makePlateMarkup(regNo) {
  const formattedReg = formatTruckRegNo(regNo || '');
  return `
    <div class="plate">
      <div class="plate-left">
        <svg width="28" height="28" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="45" fill="none" stroke="#1a4fa0" stroke-width="4.5"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="#1a4fa0" stroke-width="2"/>
          <circle cx="50" cy="50" r="7.5" fill="none" stroke="#1a4fa0" stroke-width="2.6"/>
          <circle cx="50" cy="50" r="2.6" fill="#1a4fa0"/>
          <g stroke="#1a4fa0" stroke-width="2.6" stroke-linecap="round">
            <line x1="50" y1="50" x2="50" y2="12"/>
            <line x1="50" y1="50" x2="59.84" y2="13.3"/>
            <line x1="50" y1="50" x2="69" y2="17.09"/>
            <line x1="50" y1="50" x2="77.17" y2="22.83"/>
            <line x1="50" y1="50" x2="83.91" y2="31"/>
            <line x1="50" y1="50" x2="86.7" y2="40.16"/>
            <line x1="50" y1="50" x2="88" y2="50"/>
            <line x1="50" y1="50" x2="86.7" y2="59.84"/>
            <line x1="50" y1="50" x2="83.91" y2="69"/>
            <line x1="50" y1="50" x2="77.17" y2="77.17"/>
            <line x1="50" y1="50" x2="69" y2="83.91"/>
            <line x1="50" y1="50" x2="59.84" y2="86.7"/>
            <line x1="50" y1="50" x2="50" y2="88"/>
            <line x1="50" y1="50" x2="40.16" y2="86.7"/>
            <line x1="50" y1="50" x2="31" y2="83.91"/>
            <line x1="50" y1="50" x2="22.83" y2="77.17"/>
            <line x1="50" y1="50" x2="16.09" y2="69"/>
            <line x1="50" y1="50" x2="13.3" y2="59.84"/>
            <line x1="50" y1="50" x2="12" y2="50"/>
            <line x1="50" y1="50" x2="13.3" y2="40.16"/>
            <line x1="50" y1="50" x2="16.09" y2="31"/>
            <line x1="50" y1="50" x2="22.83" y2="22.83"/>
            <line x1="50" y1="50" x2="31" y2="16.09"/>
            <line x1="50" y1="50" x2="40.16" y2="13.3"/>
          </g>
        </svg>
        <div class="ind-label">IND</div>
      </div>
      <div class="plate-divider"></div>
      <div class="plate-reg">${formattedReg || 'UNREGISTERED'}</div>
    </div>
  `;
}

function renderFleetCards() {
  const container = document.getElementById('fleet-container');
  const emptyState = document.getElementById('fleet-empty-state');
  const rows = getFilteredFleetRows();
  container.innerHTML = '';
  if (!rows.length) {
    emptyState.style.display = '';
    return;
  }
  emptyState.style.display = 'none';
  const fragment = document.createDocumentFragment();
  rows.forEach((row) => {
    const status = normalizeStatus(row.status);
    const card = document.createElement('div');
    card.className = 'truck-card';
    card.dataset.status = status;
    card.innerHTML = `
      <div class="truck-card-head">
        <div class="truck-model">${summarizeTruckType(row)}</div>
        <div class="status-badge ${status}">
          <span class="live-dot"></span>${humanizeStatus(row.status)}
        </div>
      </div>
      <div class="plate-section">${makePlateMarkup(row.reg_no || row.regNo)}</div>
    `;
    card.addEventListener('click', () => {
      window.location.href = `/Truck_Detail.html?id=${encodeURIComponent(row.id)}`;
    });
    fragment.appendChild(card);
  });
  container.appendChild(fragment);
  document.querySelectorAll('.plate-reg').forEach((el) => {
    let size = 24;
    while (el.scrollWidth > el.clientWidth && size > 12) {
      size--;
      el.style.fontSize = size + 'px';
    }
  });
}

async function loadFleetRows() {
  try {
    const response = await authFetch('/api/fleet');
    if (!response.ok) throw new Error('Could not load fleet right now.');
    const rows = await response.json().catch(() => []);
    fleetRows = Array.isArray(rows) ? rows : [];
    updateStats(fleetRows);
    renderFleetCards();
  } catch (error) {
    console.error('Fleet load failed:', error);
    const emptyState = document.getElementById('fleet-empty-state');
    emptyState.style.display = '';
    emptyState.innerHTML = `
      <div class="empty-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7a7a6e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle><path d="M12 8v5"></path><circle cx="12" cy="16" r="1"></circle>
        </svg>
      </div>
      <div class="empty-title">Fleet unavailable</div>
      <div class="empty-sub">${error.message || 'Fleet could not be loaded right now.'}</div>
    `;
  }
}

function setFilter(filter, pill) {
  currentFilter = filter;
  document.querySelectorAll('.filter-row .pill').forEach((el) => {
    el.classList.remove('active');
    el.classList.add('inactive');
  });
  pill.classList.remove('inactive');
  pill.classList.add('active');
  renderFleetCards();
}

function filterCards(query) {
  currentSearch = String(query || '').trim().toLowerCase();
  renderFleetCards();
}

loadFleetRows();
</script>

    if(localStorage.getItem('fleetos_v') !== BUILD){
      localStorage.setItem('fleetos_v', BUILD);
      location.reload(true);
    }
  })();
</script>
